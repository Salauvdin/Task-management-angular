<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>
  
  <!-- Main Content -->
  <div class="flex-1 p-6">
    <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">
        <i class="fa-solid fa-users text-blue-400 mr-3"></i>
        Create Team
      </h1>
      <p class="text-gray-400 text-lg">
        Build and manage your team members
      </p>
    </div>

    <!-- Success/Error Messages -->
    <div *ngIf="successMessage" class="mb-6 p-4 bg-green-500/20 border border-green-500/30 rounded-xl text-green-300">
      <i class="fa-solid fa-check-circle mr-2"></i>
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300">
      <i class="fa-solid fa-exclamation-triangle mr-2"></i>
      {{ errorMessage }}
    </div>

    <!-- Create Team Form -->
    <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-8 shadow-2xl">
      <form (ngSubmit)="createTeam()" class="space-y-6">
        <!-- Team Name -->
        <div class="bg-slate-800/50 border border-white/10 rounded-xl p-6">
          <label class="text-sm text-blue-300 font-medium flex items-center gap-2 mb-3">
            <i class="fa-solid fa-building text-blue-400"></i>
            Team Name
            <span class="text-red-400">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="teamForm.name"
            name="teamName"
            placeholder="Enter team name..."
            (input)="validateTeamName()"
            class="w-full bg-slate-700/50 border border-blue-500/20 text-white px-4 py-3 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/30 outline-none transition-all duration-200 placeholder-gray-500"
            [class.border-red-500/50]="nameError"
          />
          <div *ngIf="nameError" class="text-red-400 text-sm mt-2 flex items-center gap-1">
            <i class="fa-solid fa-exclamation-circle text-xs"></i>
            {{ nameError }}
          </div>
        </div>

        <!-- Team Description -->
        <div class="bg-slate-800/50 border border-white/10 rounded-xl p-6">
          <label class="text-sm text-blue-300 font-medium flex items-center gap-2 mb-3">
            <i class="fa-solid fa-align-left text-blue-400"></i>
            Team Description
            <span class="text-red-400">*</span>
          </label>
          <textarea
            [(ngModel)]="teamForm.description"
            name="teamDescription"
            placeholder="Describe your team's purpose, goals, and responsibilities..."
            rows="4"
            (input)="validateTeamDescription()"
            class="w-full bg-slate-700/50 border border-blue-500/20 text-white px-4 py-3 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/30 outline-none transition-all duration-200 placeholder-gray-500 resize-none"
            [class.border-red-500/50]="descriptionError"
          ></textarea>
          <div *ngIf="descriptionError" class="text-red-400 text-sm mt-2 flex items-center gap-1">
            <i class="fa-solid fa-exclamation-circle text-xs"></i>
            {{ descriptionError }}
          </div>
        </div>

        <!-- Team Members -->
        <div class="bg-slate-800/50 border border-white/10 rounded-xl p-6">
          <app-team-member
            [members]="teamForm.members"
            [readonly]="isLoading"
            [showRoles]="true"
            (memberAdd)="onMemberAdd($event)"
            (memberRemove)="onMemberRemove($event)"
            (membersChange)="onMembersChange($event)"
          ></app-team-member>
        </div>

        <!-- Form Summary -->
        <div class="bg-slate-800/30 border border-slate-600/30 rounded-xl p-4">
          <div class="flex items-center justify-between text-sm">
            <span class="text-gray-400">Team Summary:</span>
            <span class="text-blue-300">
              {{ teamForm.name || 'Unnamed Team' }} • {{ memberCount }} member(s)
            </span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4">
          <button
            type="submit"
            [disabled]="!isFormValid || isLoading"
            class="flex-1 bg-green-500/20 hover:bg-green-500/30 disabled:bg-gray-600/20 disabled:opacity-50 text-green-300 disabled:text-gray-500 border border-green-500/30 px-6 py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
          >
            <i *ngIf="!isLoading" class="fa-solid fa-check"></i>
            <i *ngIf="isLoading" class="fa-solid fa-spinner fa-spin"></i>
            {{ isLoading ? 'Creating Team...' : 'Create Team' }}
          </button>
          <button
            type="button"
            (click)="resetForm()"
            [disabled]="isLoading"
            class="flex-1 bg-gray-600/20 hover:bg-gray-600/30 disabled:bg-gray-700/20 disabled:opacity-50 text-gray-300 disabled:text-gray-500 border border-gray-600/30 px-6 py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
          >
            <i class="fa-solid fa-undo"></i>
            Reset Form
          </button>
        </div>
      </form>
    </div>

    <!-- Back Button -->
    <div class="mt-6 text-center">
      <button
        (click)="goBack()"
        [disabled]="isLoading"
        class="bg-indigo-500/20 hover:bg-indigo-500/30 disabled:bg-gray-600/20 disabled:opacity-50 text-indigo-300 disabled:text-gray-500 border border-indigo-500/30 px-6 py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 mx-auto"
      >
        <i class="fa-solid fa-arrow-left"></i>
        Back to Dashboard
      </button>
    </div>
    </div>
  </div>
</div>
