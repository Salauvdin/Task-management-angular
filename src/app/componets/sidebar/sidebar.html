<div
  class="bg-gradient-to-br from-[#0F172A] via-[#1E293B] to-[#0F172A] border-r border-indigo-500/20 h-screen flex flex-col flex-shrink-0 sticky top-0 transition-all duration-500 select-none shadow-2xl relative"
  [ngClass]="collapsed ? 'w-20' : 'w-64'"
>
  <div class="absolute inset-0 bg-gradient-to-t from-indigo-500/10 via-transparent to-transparent pointer-events-none"></div>
  
  <div class="relative z-10 flex flex-col h-full">
    
    <!-- TOP Section -->
    <div class="p-5 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3" *ngIf="!collapsed">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-600/30">
            <i class="fa-solid fa-crown text-white text-sm"></i>
          </div>
          <span class="text-white text-xl font-bold">Admin Panel</span>
        </div>
        
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-600/30" *ngIf="collapsed">
          <i class="fa-solid fa-crown text-white text-sm"></i>
        </div>
        
        <button
          (click)="toggleSidebar()"
          class="text-indigo-300 hover:text-white transition-all duration-300 hover:bg-indigo-600/20 w-10 h-10 rounded-xl flex items-center justify-center"
          [ngClass]="collapsed ? 'rotate-180' : ''"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- Navigation Menu - ONLY SHOWS ITEMS USER HAS PERMISSION FOR -->
    <div class="flex-1 overflow-y-auto scrollbar-hide px-3 py-2">
      <nav class="space-y-1.5">
        <!-- Loop through only visible menu items (filtered by permissions) -->
        <ng-container *ngFor="let item of visibleMenuItems">
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-gradient-to-r from-{{item.color}}-500 to-{{item.color}}-600 text-white shadow-lg shadow-{{item.color}}-600/30"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-3 p-3 rounded-xl text-indigo-200/80 hover:bg-{{item.color}}-500/20 hover:text-white transition-all duration-200 group relative"
            [class.justify-center]="collapsed"
          >
            <i [class]="item.icon + ' text-lg text-' + item.color + '-300 w-5'"></i>
            <span *ngIf="!collapsed" class="font-medium">{{ item.label }}</span>
            <span
              *ngIf="collapsed"
              class="absolute left-full ml-2 bg-{{item.color}}-600 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-all duration-200 whitespace-nowrap z-50 pointer-events-none shadow-lg"
            >
              {{ item.label }}
            </span>
          </a>
        </ng-container>

        <!-- Show message if no menus available -->
        <div *ngIf="visibleMenuItems.length === 0" class="text-center py-8">
          <i class="fa-solid fa-lock text-4xl text-gray-600 mb-2"></i>
          <p class="text-xs text-gray-500">No accessible menus</p>
        </div>
      </nav>
    </div>
    
    <!-- LOGOUT BUTTON (Always visible) -->
    <div class="flex-shrink-0 border-t border-indigo-500/20 pt-4 pb-4">
      <div *ngIf="!collapsed" class="px-3">
        <button
          (click)="logout()"
          class="w-full flex items-center gap-3 p-3 rounded-xl text-red-300 hover:text-white hover:bg-red-500/20 transition-all duration-200 group"
        >
          <i class="fa-solid fa-sign-out-alt text-lg text-red-400 w-5"></i>
          <span class="font-medium">Logout</span>
        </button>
      </div>

      <div *ngIf="collapsed" class="flex justify-center">
        <div class="relative group">
          <button
            (click)="logout()"
            class="w-10 h-10 rounded-xl bg-red-500/20 hover:bg-red-500/30 text-red-400 hover:text-white transition-all duration-200 flex items-center justify-center"
          >
            <i class="fa-solid fa-sign-out-alt text-lg"></i>
          </button>
          <span class="absolute left-full ml-2 bg-red-600 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-all duration-200 whitespace-nowrap z-50 pointer-events-none shadow-lg">
            Logout
          </span>
        </div>
      </div>
    </div>

    <!-- User Profile Section (Always visible) -->
    <div class="p-4 flex-shrink-0 border-t border-indigo-500/20">
      <div *ngIf="!collapsed" class="space-y-3">
        <div class="flex items-center gap-2 text-xs text-indigo-300/50">
          <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
          <span>System Online</span>
        </div>
        
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-all duration-200">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center">
            <i class="fa-solid fa-user text-white text-sm"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-white truncate">{{ getCurrentUserName() }}</p>
            <p class="text-xs text-indigo-300/50 truncate">{{ getCurrentUserEmail() }}</p>
            <p class="text-xs text-indigo-400/50 mt-0.5" *ngIf="isAdmin()">
              <i class="fa-solid fa-shield-halved text-xs"></i> Administrator
            </p>
          </div>
        </div>
        
        <div class="text-[10px] text-indigo-300/30 text-center">
          v2.0.0 • Enterprise
        </div>
      </div>

      <div *ngIf="collapsed" class="space-y-4">
        <div class="flex justify-center">
          <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        </div>
        
        <div class="relative group flex justify-center">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center cursor-pointer">
            <i class="fa-solid fa-user text-white text-sm"></i>
          </div>
          <span class="absolute left-full ml-2 bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-all duration-200 whitespace-nowrap z-50 pointer-events-none shadow-lg">
            {{ getCurrentUserName() }}
          </span>
        </div>
        
        <div class="text-[10px] text-indigo-300/30 text-center">
          v2.0.0 • Enterprise
        </div>
      </div>
    </div>

  </div>
</div>
