<div
  class="min-h-screen flex items-center justify-center bg-cover bg-center relative overflow-hidden"
  style="background-image: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85');"
>
  <!-- Dark overlay with subtle animation -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-all duration-500"></div>

  <!-- floating particle effect -->
  <div class="absolute inset-0">
    <div class="animate-pulse-slow absolute w-48 h-48 bg-blue-500/20 rounded-full -top-24 -left-24"></div>
    <div class="animate-pulse-slow absolute w-72 h-72 bg-pink-500/20 rounded-full -bottom-32 -right-32"></div>
  </div>

  <!-- Register Card -->
  <div 
    class="relative w-full md:w-96 transform transition-all duration-700 ease-out opacity-0 translate-y-8 animate-fade-slide"
  >
    <z-card
      class="bg-white/80 backdrop-blur-xl shadow-2xl rounded-2xl p-8 flex flex-col gap-6"
      zTitle="Create an Account"
      zDescription="Enter your details below to get started"
      zAction="Login"
      (zActionClick)="goToLogin()"
    >
      <form (ngSubmit)="register()" class="space-y-4">
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-md text-sm">
          {{ errorMessage }}
        </div>

        <!-- Name Field with Validation -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">
            Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Enter your name"
            (blur)="validateName()"
            (input)="validateName()"
            class="w-full px-3 py-2 text-sm rounded-md border focus:ring-2 focus:ring-blue-500 outline-none bg-transparent transition-all duration-300 hover:scale-[1.02]"
            [class.border-red-500]="nameError"
            [class.border-gray-300]="!nameError"
            [readonly]="isLoading"
          />
          <div *ngIf="nameError" class="text-red-500 text-xs mt-1">
            {{ nameError }}
          </div>
        </div>

        <!-- Email Field with Validation -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">
            Email <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="example@gmail.com"
            (blur)="validateEmail()"
            (input)="validateEmail()"
            class="w-full px-3 py-2 text-sm rounded-md border focus:ring-2 focus:ring-blue-500 outline-none bg-transparent transition-all duration-300 hover:scale-[1.02]"
            [class.border-red-500]="emailError"
            [class.border-gray-300]="!emailError"
            [readonly]="isLoading"
          />
          <div *ngIf="emailError" class="text-red-500 text-xs mt-1">
            {{ emailError }}
          </div>
        </div>

        <!-- Role Field with Validation -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">
            Role <span class="text-red-500">*</span>
          </label>
          <select
            [(ngModel)]="role"
            name="role"
            (change)="validateRole()"
            class="w-full px-3 py-2 text-sm rounded-md border focus:ring-2 focus:ring-blue-500 outline-none bg-transparent transition-all duration-300 hover:scale-[1.02]"
            [class.border-red-500]="roleError"
            [class.border-gray-300]="!roleError"
            [disabled]="isLoading"
          >
            <option value="">Select Role</option>
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="TeamMember">Team Member</option>
          </select>
          <div *ngIf="roleError" class="text-red-500 text-xs mt-1">
            {{ roleError }}
          </div>
        </div>

        <!-- Password Field with Validation -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">
            Password <span class="text-red-500">*</span>
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter password"
              (blur)="validatePassword()"
              (input)="validatePassword()"
              class="w-full px-3 py-2 text-sm rounded-md border focus:ring-2 focus:ring-blue-500 outline-none bg-transparent transition-all duration-300 hover:scale-[1.02]"
              [class.border-red-500]="passwordError"
              [class.border-gray-300]="!passwordError"
              [readonly]="isLoading"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-2 text-xs text-gray-500"
              [disabled]="isLoading"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <div *ngIf="passwordError" class="text-red-500 text-xs mt-1">
            {{ passwordError }}
          </div>
          <!-- Password strength indicator -->
          <div *ngIf="password && !passwordError" class="mt-1">
            <div class="flex gap-1">
              <div class="h-1 flex-1 rounded-full" 
                   [class.bg-red-500]="password.length < 6"
                   [class.bg-yellow-500]="password.length >= 6 && password.length < 8"
                   [class.bg-green-500]="password.length >= 8"></div>
              <div class="h-1 flex-1 rounded-full"
                   [class.bg-gray-200]="!(/(?=.*[A-Z])/.test(password))"
                   [class.bg-green-500]="/(?=.*[A-Z])/.test(password)"></div>
              <div class="h-1 flex-1 rounded-full"
                   [class.bg-gray-200]="!(/(?=.*[a-z])/.test(password))"
                   [class.bg-green-500]="/(?=.*[a-z])/.test(password)"></div>
              <div class="h-1 flex-1 rounded-full"
                   [class.bg-gray-200]="!(/(?=.*[0-9])/.test(password))"
                   [class.bg-green-500]="/(?=.*[0-9])/.test(password)"></div>
            </div>
            <p class="text-xs text-gray-500 mt-1">Password must have: 6+ chars, uppercase, lowercase, number</p>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-3 mt-4">
          <button 
            type="submit" 
            class="w-full transform hover:scale-105 bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl shadow-lg transition duration-300 font-semibold disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="isLoading || !isFormValid()"
          >
            {{ isLoading ? 'Registering...' : 'Register' }}
          </button>
          <button 
            type="button"
            class="w-full transform transition-all duration-300 hover:scale-105 border border-gray-300 rounded-xl px-5 py-3 bg-white/50 hover:bg-white/80 font-semibold"
            (click)="goToLogin()"
            [disabled]="isLoading"
          >
            Already have an account
          </button>
        </div>
      </form>
    </z-card>
  </div>
</div>

<style>
@keyframes fade-slide {
  0% {
    opacity: 0;
    transform: translateY(2rem);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-slide {
  animation: fade-slide 0.8s ease-out forwards;
}
</style>
