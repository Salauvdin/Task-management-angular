<div
  class="min-h-screen flex items-center justify-center bg-cover bg-center relative overflow-hidden"
  style="background-image: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85');"
>
  <!-- dark overlay with slight blur -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <!-- floating particle effect -->
  <div class="absolute inset-0">
    <div class="animate-pulse-slow absolute w-48 h-48 bg-blue-500/20 rounded-full -top-24 -left-24"></div>
    <div class="animate-pulse-slow absolute w-72 h-72 bg-pink-500/20 rounded-full -bottom-32 -right-32"></div>
  </div>

  <!-- login card -->
  <div class="relative w-full md:w-96 animate-fade-in">
    <z-card
      class="bg-white/80 backdrop-blur-xl shadow-2xl rounded-2xl p-8 flex flex-col gap-6"
      zTitle="Welcome Back"
      zDescription="Login to your account to continue"
      zAction="Sign Up"
      (zActionClick)="goToRegister()"
    >
      <form (ngSubmit)="login()" class="space-y-4">
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-md text-sm">
          {{ errorMessage }}
        </div>

        <!-- EMAIL -->
        <div class="space-y-1" zardId="email" #e="zardId">
          <label [for]="e.id()" class="text-sm font-semibold text-gray-700">Email</label>
          <div class="flex items-center border rounded-md border-gray-300 px-3 py-2 focus-within:ring-2 focus-within:ring-blue-500 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H8m8 4H8m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <input
              [id]="e.id()"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="example@gmail.com"
              class="w-full outline-none bg-transparent text-gray-900 placeholder-gray-400 text-sm"
              [readonly]="isLoading"
              required
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="space-y-1" zardId="password" #p="zardId">
          <div class="flex items-center justify-between">
            <label [for]="p.id()" class="text-sm font-semibold text-gray-700">Password</label>
            <a routerLink="/forgot-password" class="text-sm text-blue-500 hover:underline">Forgot?</a>
          </div>
          <div class="flex items-center border rounded-md border-gray-300 px-3 py-2 focus-within:ring-2 focus-within:ring-blue-500 transition relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.5 0 3-1.5 3-3s-1.5-3-3-3-3 1.5-3 3 1.5 3 3 3zm0 0v8m0 0h3m-3 0H9"/>
            </svg>
            <input
              [id]="p.id()"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter password"
              class="w-full outline-none bg-transparent text-gray-900 placeholder-gray-400 text-sm"
              [readonly]="isLoading"
              required
            />
            <button type="button" (click)="togglePassword()" class="absolute right-3 text-xs text-gray-500" [disabled]="isLoading">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        <!-- LOGIN BUTTONS -->
        <div class="flex flex-col gap-3 mt-4">
          <z-button 
            zType="default" 
            type="button" 
             (click)="login()"
            class="w-full hover:scale-105 transition-transform bg-blue-600 hover:bg-blue-700 px-5 py-3 rounded-xl shadow-lg duration-300 font-semibold"
          >
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </z-button>
          <z-button 
            zType="outline" 
            class="w-full flex items-center justify-center gap-2 hover:scale-105 transition-transform"
          >
            <svg class="w-4 h-4" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M533.5 278.4c0-17.7-1.6-35-4.8-51.8H272v98h146.9c-6.4 34.5-25.8 63.8-55.1 83.5v69.5h89.1c52.2-48.1 82.6-119 82.6-199.2z"/>
              <path fill="#34A853" d="M272 544.3c74.7 0 137.5-24.7 183.3-67.2l-89.1-69.5c-24.8 16.7-56.6 26.5-94.2 26.5-72.5 0-134-48.9-155.8-114.9H26.9v72.1C72.6 481.8 166.5 544.3 272 544.3z"/>
              <path fill="#FBBC05" d="M116.2 319.2c-10.6-31.6-10.6-65.9 0-97.5v-72.1H26.9c-45.3 89.1-45.3 195.8 0 284.9l89.3-72.1z"/>
              <path fill="#EA4335" d="M272 107.7c39.4-.6 76.9 14.2 105.6 41.7l79.1-79.1C409.5 23.2 343.7-1.3 272 0 166.5 0 72.6 62.5 26.9 155.1l89.3 72.1c21.8-66 83.3-114.9 155.8-114.9z"/>
            </svg>
            Login with Google
          </z-button>
        </div>
      </form>

      <!-- Footer -->
      <p class="text-center text-sm text-gray-600 mt-2">
        Don't have an account?
        <button type="button" class="text-blue-500 font-medium" (click)="goToRegister()" [disabled]="isLoading">Sign Up</button>
      </p>
    </z-card>
  </div>
</div>

<style>
@keyframes fade-slide {
  0% {
    opacity: 0;
    transform: translateY(2rem);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-slide {
  animation: fade-slide 0.8s ease-out forwards;
}
</style>
